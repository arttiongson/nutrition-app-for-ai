# Fly.io config for the Nutrition MCP server.
# `app` is globally unique on Fly — `fly launch` will reconcile/rename if needed.
app = "nutrition-mcp-for-ai"
primary_region = "sjc"   # near the Supabase project (us-west-1 / N. California)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  PORT = "3000"
