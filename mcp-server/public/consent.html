<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Authorize — Nutrition App For AI</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 16px/1.5 system-ui, -apple-system, sans-serif; margin: 0;
         min-height: 100vh; display: grid; place-items: center; background: #0b0f14; color: #e6edf3; }
  .card { width: min(420px, 92vw); background: #131922; border: 1px solid #222c3a;
          border-radius: 16px; padding: 28px; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .muted { color: #8b98a9; font-size: 14px; }
  .scopes { background: #0b0f14; border: 1px solid #222c3a; border-radius: 10px;
            padding: 10px 12px; margin: 16px 0; font-size: 14px; }
  input { width: 100%; padding: 11px 12px; margin: 6px 0; border-radius: 10px;
          border: 1px solid #2b3848; background: #0b0f14; color: #e6edf3; font-size: 15px; }
  .row { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 11px 14px; border-radius: 10px; border: 0; cursor: pointer;
           font-size: 15px; font-weight: 600; }
  .primary { background: #3b82f6; color: #fff; }
  .ghost { background: transparent; color: #e6edf3; border: 1px solid #2b3848; }
  .msg { color: #f87171; font-size: 14px; min-height: 18px; margin-top: 8px; }
  a.link { color: #60a5fa; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div class="card" id="app"><p class="muted">Loading…</p></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const app = document.getElementById("app");
const params = new URLSearchParams(location.search);
const authId = params.get("authorization_id");

const cfg = await (await fetch("/oauth/config.json")).json();
const supabase = createClient(cfg.url, cfg.key);

const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

async function main() {
  if (!authId) { app.innerHTML = `<h1>Invalid request</h1><p class="muted">Missing authorization_id.</p>`; return; }
  const { data: { user } } = await supabase.auth.getUser();
  user ? renderConsent(user) : renderAuth(false);
}

function renderAuth(isSignup) {
  app.innerHTML = `
    <h1>${isSignup ? "Create account" : "Sign in"}</h1>
    <p class="muted">to authorize access to your nutrition data</p>
    <input id="email" type="email" placeholder="Email" autocomplete="email" />
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password" />
    <div class="row"><button class="primary" id="go">${isSignup ? "Sign up" : "Sign in"}</button></div>
    <p class="msg" id="msg"></p>
    <p><a class="link" id="toggle">${isSignup ? "Have an account? Sign in" : "Need an account? Sign up"}</a></p>`;
  document.getElementById("toggle").onclick = () => renderAuth(!isSignup);
  document.getElementById("go").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value;
    const msg = document.getElementById("msg");
    msg.textContent = "…";
    const fn = isSignup ? supabase.auth.signUp({ email, password }) : supabase.auth.signInWithPassword({ email, password });
    const { error } = await fn;
    if (error) { msg.textContent = error.message; return; }
    main();
  };
}

async function renderConsent(user) {
  const { data, error } = await supabase.auth.oauth.getAuthorizationDetails(authId);
  if (error) { app.innerHTML = `<h1>Error</h1><p class="muted">${esc(error.message)}</p>`; return; }
  app.innerHTML = `
    <h1>Authorize access</h1>
    <p class="muted"><b>${esc(data.client?.name ?? "An application")}</b> wants to read and write your nutrition data.</p>
    <div class="scopes">Scopes: ${esc(data.scope || "openid email profile")}</div>
    <p class="muted">Signed in as ${esc(user.email)}</p>
    <div class="row">
      <button class="primary" id="approve">Approve</button>
      <button class="ghost" id="deny">Deny</button>
    </div>
    <p class="msg" id="msg"></p>`;
  document.getElementById("approve").onclick = async () => {
    const { data: r, error } = await supabase.auth.oauth.approveAuthorization(authId);
    if (error) { document.getElementById("msg").textContent = error.message; return; }
    location.href = r.redirect_url;
  };
  document.getElementById("deny").onclick = async () => {
    const { data: r } = await supabase.auth.oauth.denyAuthorization(authId);
    if (r?.redirect_url) location.href = r.redirect_url; else app.innerHTML = `<h1>Denied</h1>`;
  };
}

main();
</script>
</body>
</html>
